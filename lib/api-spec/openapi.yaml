openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: RPG World - Hệ thống nhập vai chiến đấu NPC
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: characters
    description: Nhân vật người chơi
  - name: worlds
    description: Thế giới game
  - name: npcs
    description: NPC trong thế giới
  - name: battles
    description: Chiến đấu
  - name: inventory
    description: Kho đồ và trang bị
  - name: progression
    description: Tiến trình và xếp hạng

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── CHARACTERS ──────────────────────────────────────────────
  /characters:
    get:
      operationId: listCharacters
      tags: [characters]
      summary: Danh sách nhân vật
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Character"
    post:
      operationId: createCharacter
      tags: [characters]
      summary: Tạo nhân vật mới
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CharacterInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  /characters/{id}:
    get:
      operationId: getCharacter
      tags: [characters]
      summary: Chi tiết nhân vật
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"
    delete:
      operationId: deleteCharacter
      tags: [characters]
      summary: Xoá nhân vật
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /characters/{id}/stats:
    get:
      operationId: getCharacterStats
      tags: [characters]
      summary: Chỉ số chi tiết nhân vật
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CharacterStats"

  # ── WORLDS ──────────────────────────────────────────────────
  /worlds:
    get:
      operationId: listWorlds
      tags: [worlds]
      summary: Danh sách thế giới
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/World"

  /worlds/{id}:
    get:
      operationId: getWorld
      tags: [worlds]
      summary: Chi tiết thế giới
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/World"

  /worlds/{id}/locations:
    get:
      operationId: listWorldLocations
      tags: [worlds]
      summary: Địa điểm trong thế giới
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"

  /worlds/{id}/npcs:
    get:
      operationId: listWorldNpcs
      tags: [worlds]
      summary: NPC trong thế giới
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Npc"

  /locations/{id}/npcs:
    get:
      operationId: listLocationNpcs
      tags: [npcs]
      summary: NPC trong địa điểm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Npc"

  /locations/{id}:
    get:
      operationId: getLocation
      tags: [worlds]
      summary: Chi tiết địa điểm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Location"
        "404":
          description: Not found

  /interact:
    post:
      operationId: interact
      tags: [npcs]
      summary: Tương tác với NPC
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InteractInput"
      responses:
        "200":
          description: Interaction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InteractResult"
        "400":
          description: Invalid action or bad input
        "403":
          description: NPC not interactable, wrong location, or action not allowed
        "404":
          description: NPC or character not found

  /quests/{id}:
    get:
      operationId: getQuest
      tags: [quests]
      summary: Lấy chi tiết nhiệm vụ
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Quest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quest"
        "404":
          description: Quest not found

  /quests/{id}/accept:
    post:
      operationId: acceptQuest
      tags: [quests]
      summary: Nhận nhiệm vụ
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestCharacterInput"
      responses:
        "201":
          description: Quest accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AcceptQuestResult"
        "400":
          description: Invalid input
        "403":
          description: Character level too low
        "404":
          description: Quest or character not found
        "409":
          description: Quest already accepted

  /quests/{id}/claim:
    post:
      operationId: claimQuest
      tags: [quests]
      summary: Nhận thưởng nhiệm vụ
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestCharacterInput"
      responses:
        "200":
          description: Rewards granted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimQuestResult"
        "400":
          description: Quest not yet completed
        "404":
          description: Quest or character not found
        "409":
          description: Already claimed

  /characters/{id}/quests:
    get:
      operationId: getCharacterQuests
      tags: [quests]
      summary: Danh sách nhiệm vụ của nhân vật
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Character quest list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CharacterQuestWithDetails"

  /characters/{id}/reputation:
    get:
      operationId: getCharacterReputation
      tags: [reputation]
      summary: Danh tiếng của nhân vật theo từng thế giới
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: World reputation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WorldReputationEntry"

  /characters/{id}/relationships:
    get:
      operationId: getCharacterRelationships
      tags: [reputation]
      summary: Mối quan hệ của nhân vật với các NPC
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: NPC relationship list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NpcRelationshipEntry"

  /characters/{id}/relationships/{npcId}:
    get:
      operationId: getCharacterNpcRelationship
      tags: [reputation]
      summary: Mối quan hệ với một NPC cụ thể
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
        - in: path
          name: npcId
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: NPC relationship entry (score 0 / Trung Lập if never interacted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NpcRelationshipEntry"
        "404":
          description: NPC not found

  /travel:
    post:
      operationId: travel
      tags: [worlds]
      summary: Di chuyển nhân vật đến thế giới/địa điểm
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelInput"
      responses:
        "200":
          description: Travelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelResult"
        "403":
          description: Level too low
        "404":
          description: Character, world or location not found

  # ── NPCS ────────────────────────────────────────────────────
  /npcs:
    get:
      operationId: listNpcs
      tags: [npcs]
      summary: Tất cả NPC
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Npc"

  /npcs/{id}:
    get:
      operationId: getNpc
      tags: [npcs]
      summary: Chi tiết NPC
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Npc"

  # ── BATTLES ─────────────────────────────────────────────────
  /battles:
    get:
      operationId: listBattles
      tags: [battles]
      summary: Lịch sử chiến đấu
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Battle"
    post:
      operationId: startBattle
      tags: [battles]
      summary: Bắt đầu trận chiến
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleStart"
      responses:
        "201":
          description: Battle started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battle"

  /battles/{id}:
    get:
      operationId: getBattle
      tags: [battles]
      summary: Chi tiết trận chiến
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Battle"

  /battles/{id}/action:
    post:
      operationId: battleAction
      tags: [battles]
      summary: Thực hiện hành động chiến đấu
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BattleActionInput"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BattleActionResult"

  # ── INVENTORY ───────────────────────────────────────────────
  /characters/{id}/inventory:
    get:
      operationId: getInventory
      tags: [inventory]
      summary: Kho đồ nhân vật
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /characters/{id}/equip:
    post:
      operationId: equipItem
      tags: [inventory]
      summary: Trang bị vật phẩm
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EquipInput"
      responses:
        "200":
          description: Equipped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Character"

  # ── PROGRESSION ─────────────────────────────────────────────
  /progression/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [progression]
      summary: Bảng xếp hạng
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  /progression/summary:
    get:
      operationId: getProgressionSummary
      tags: [progression]
      summary: Tổng quan tiến trình game
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressionSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Character ──
    Character:
      type: object
      required: [id, name, class, level, hp, maxHp, xp, xpToNext, gold, worldId]
      properties:
        id:                 { type: integer }
        name:               { type: string }
        class:              { type: string }
        level:              { type: integer }
        hp:                 { type: integer }
        maxHp:              { type: integer }
        xp:                 { type: integer }
        xpToNext:           { type: integer }
        gold:               { type: integer }
        worldId:            { type: ["integer", "null"] }
        currentLocationId:  { type: ["integer", "null"] }
        equippedWeapon:     { type: ["string", "null"] }
        equippedArmor:      { type: ["string", "null"] }
        createdAt:          { type: string }

    CharacterInput:
      type: object
      required: [name, class]
      properties:
        name:  { type: string, minLength: 1 }
        class: { type: string }

    CharacterStats:
      type: object
      required: [characterId, attack, defense, speed, critRate, totalBattles, wins, losses]
      properties:
        characterId:   { type: integer }
        attack:        { type: integer }
        defense:       { type: integer }
        speed:         { type: integer }
        critRate:      { type: integer }
        totalBattles:  { type: integer }
        wins:          { type: integer }
        losses:        { type: integer }

    # ── Location ──
    Location:
      type: object
      required: [id, worldId, name, description, dangerLevel]
      properties:
        id:          { type: integer }
        worldId:     { type: integer }
        name:        { type: string }
        description: { type: string }
        dangerLevel: { type: integer }

    # ── Interaction ──
    NpcInteractionType:
      type: string
      enum: [talk, trade, quest, inspect]

    InteractInput:
      type: object
      required: [characterId, npcId, action]
      properties:
        characterId: { type: integer }
        npcId:       { type: integer }
        action:      { $ref: "#/components/schemas/NpcInteractionType" }

    InteractResult:
      type: object
      required: [npc, interaction, availableActions]
      properties:
        npc:
          type: object
          required: [id, name, role]
          properties:
            id:   { type: integer }
            name: { type: string }
            role: { $ref: "#/components/schemas/NpcRole" }
        interaction:
          type: object
          required: [action, message]
          properties:
            action:  { $ref: "#/components/schemas/NpcInteractionType" }
            message: { type: string }
        availableActions:
          type: array
          items:
            $ref: "#/components/schemas/NpcInteractionType"

    NpcInteraction:
      type: object
      required: [id, characterId, npcId, interactionType, createdAt]
      properties:
        id:              { type: integer }
        characterId:     { type: integer }
        npcId:           { type: integer }
        interactionType: { $ref: "#/components/schemas/NpcInteractionType" }
        metadata:        { type: object, nullable: true }
        createdAt:       { type: string }

    # ── Quest ──
    QuestType:
      type: string
      enum: [kill_npc, kill_role]

    QuestStatus:
      type: string
      enum: [active, completed, claimed]

    Quest:
      type: object
      required: [id, title, description, questType, targetCount, requiredLevel, rewardXp, rewardGold]
      properties:
        id:             { type: integer }
        title:          { type: string }
        description:    { type: string }
        questType:      { $ref: "#/components/schemas/QuestType" }
        questGiverId:   { type: integer, nullable: true }
        targetNpcId:    { type: integer, nullable: true }
        targetRole:     { type: string, nullable: true }
        targetCount:    { type: integer }
        requiredLevel:  { type: integer }
        rewardXp:       { type: integer }
        rewardGold:     { type: integer }
        rewardItemId:   { type: integer, nullable: true }

    CharacterQuest:
      type: object
      required: [id, characterId, questId, status, progress]
      properties:
        id:          { type: integer }
        characterId: { type: integer }
        questId:     { type: integer }
        status:      { $ref: "#/components/schemas/QuestStatus" }
        progress:    { type: integer }
        completedAt: { type: string, nullable: true }

    CharacterQuestWithDetails:
      type: object
      required: [id, status, progress, quest]
      properties:
        id:          { type: integer }
        status:      { $ref: "#/components/schemas/QuestStatus" }
        progress:    { type: integer }
        completedAt: { type: string, nullable: true }
        quest:       { $ref: "#/components/schemas/Quest" }

    QuestCharacterInput:
      type: object
      required: [characterId]
      properties:
        characterId: { type: integer }

    AcceptQuestResult:
      type: object
      required: [characterQuest, quest]
      properties:
        characterQuest: { $ref: "#/components/schemas/CharacterQuest" }
        quest:          { $ref: "#/components/schemas/Quest" }

    ClaimQuestResult:
      type: object
      required: [rewards, levelUp, character, characterQuest]
      properties:
        rewards:
          type: object
          required: [xp, gold]
          properties:
            xp:   { type: integer }
            gold: { type: integer }
        levelUp:       { type: boolean }
        character:     { $ref: "#/components/schemas/Character" }
        characterQuest: { $ref: "#/components/schemas/CharacterQuest" }

    # ── Reputation ──
    WorldReputationEntry:
      type: object
      required: [worldId, worldName, score, tier]
      properties:
        worldId:   { type: integer }
        worldName: { type: string }
        score:     { type: integer }
        tier:      { type: string }
        updatedAt: { type: string, nullable: true }

    NpcRelationshipEntry:
      type: object
      required: [npcId, npcName, npcRole, score, tier]
      properties:
        npcId:     { type: integer }
        npcName:   { type: string }
        npcRole:   { $ref: "#/components/schemas/NpcRole" }
        score:     { type: integer }
        tier:      { type: string }
        updatedAt: { type: string, nullable: true }

    RelationshipEvent:
      type: object
      required: [id, characterId, eventType, delta, sourceType, createdAt]
      properties:
        id:          { type: integer }
        characterId: { type: integer }
        npcId:       { type: integer, nullable: true }
        worldId:     { type: integer, nullable: true }
        eventType:   { type: string }
        delta:       { type: integer }
        sourceType:  { type: string }
        sourceId:    { type: integer, nullable: true }
        createdAt:   { type: string }

    # ── Travel ──
    TravelInput:
      type: object
      required: [characterId, worldId]
      properties:
        characterId: { type: integer }
        worldId:     { type: integer }
        locationId:  { type: integer }

    TravelResult:
      type: object
      required: [character, world, availableNpcs]
      properties:
        character: { $ref: "#/components/schemas/Character" }
        world:     { $ref: "#/components/schemas/World" }
        location:
          oneOf:
            - $ref: "#/components/schemas/Location"
            - type: "null"
        availableNpcs:
          type: array
          items:
            $ref: "#/components/schemas/Npc"

    # ── World ──
    World:
      type: object
      required: [id, name, description, theme, minLevel, npcCount]
      properties:
        id:          { type: integer }
        name:        { type: string }
        description: { type: string }
        theme:       { type: string }
        minLevel:    { type: integer }
        npcCount:    { type: integer }
        isBossWorld: { type: boolean }

    # ── NPC ──
    NpcRole:
      type: string
      enum: [enemy, merchant, guard, quest_giver, boss]

    Npc:
      type: object
      required: [id, name, type, level, hp, worldId, difficulty, role, description, isInteractable]
      properties:
        id:             { type: integer }
        name:           { type: string }
        type:           { type: string }
        level:          { type: integer }
        hp:             { type: integer }
        maxHp:          { type: integer }
        worldId:        { type: integer }
        locationId:     { type: ["integer", "null"] }
        difficulty:     { type: string }
        xpReward:       { type: integer }
        goldReward:     { type: integer }
        isBoss:         { type: boolean }
        role:           { $ref: "#/components/schemas/NpcRole" }
        description:    { type: string }
        isInteractable: { type: boolean }

    # ── Battle ──
    Battle:
      type: object
      required: [id, characterId, npcId, status, currentTurn, log]
      properties:
        id:            { type: integer }
        characterId:   { type: integer }
        npcId:         { type: integer }
        status:        { type: string }
        currentTurn:   { type: integer }
        characterHp:   { type: integer }
        npcHp:         { type: integer }
        xpGained:      { type: ["integer", "null"] }
        goldGained:    { type: ["integer", "null"] }
        log:           { type: array, items: { type: string } }
        createdAt:     { type: string }

    BattleStart:
      type: object
      required: [characterId, npcId]
      properties:
        characterId: { type: integer }
        npcId:       { type: integer }

    BattleActionInput:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: [attack, skill, defend, flee]

    BattleActionResult:
      type: object
      required: [battle, log, isOver]
      properties:
        battle: { $ref: "#/components/schemas/Battle" }
        log:    { type: array, items: { type: string } }
        isOver: { type: boolean }
        result: { type: ["string", "null"] }

    # ── Inventory ──
    InventoryItem:
      type: object
      required: [id, characterId, name, type, rarity]
      properties:
        id:          { type: integer }
        characterId: { type: integer }
        name:        { type: string }
        type:        { type: string }
        rarity:      { type: string }
        attackBonus: { type: integer }
        defenseBonus: { type: integer }
        isEquipped:  { type: boolean }

    EquipInput:
      type: object
      required: [itemId]
      properties:
        itemId: { type: integer }

    # ── Progression ──
    LeaderboardEntry:
      type: object
      required: [rank, characterId, name, class, level, totalBattles, wins]
      properties:
        rank:         { type: integer }
        characterId:  { type: integer }
        name:         { type: string }
        class:        { type: string }
        level:        { type: integer }
        totalBattles: { type: integer }
        wins:         { type: integer }

    ProgressionSummary:
      type: object
      required: [totalCharacters, totalBattles, totalNpcsDefeated, topClass, worldsExplored]
      properties:
        totalCharacters:   { type: integer }
        totalBattles:      { type: integer }
        totalNpcsDefeated: { type: integer }
        topClass:          { type: string }
        worldsExplored:    { type: integer }
