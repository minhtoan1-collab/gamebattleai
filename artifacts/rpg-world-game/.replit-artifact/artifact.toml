kind = "web"
previewPath = "/"
title = "RPG World"
version = "1.0.0"
id = "artifacts/rpg-world-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19590

[services.development]
run = "pnpm --filter @workspace/rpg-world-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rpg-world-game", "run", "build" ]
publicDir = "artifacts/rpg-world-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19590"
BASE_PATH = "/"
